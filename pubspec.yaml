name: bu_kombinn
description: "AI ve IOT Destekli Kombin Uygulaması"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  provider: ^6.1.5+1
  shared_preferences: ^2.3.2
  video_player: ^2.11.1
  table_calendar: ^3.1.2
  intl: ^0.19.0
  file_picker: ^8.0.0
  http: ^1.6.0
  flutter_svg: ^2.2.3
  flutter_secure_storage: ^10.0.0
  geolocator: ^14.0.2
  geocoding: ^3.0.0
  flutter_dotenv: ^6.0.0
  firebase_core: ^4.5.0
  firebase_auth: ^6.2.0
  cloud_firestore: ^6.1.3
  firebase_storage: ^13.1.0
  google_sign_in: ^7.2.0


dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/videos/buKombinSplash.mp4
    - assets/images/app_icon.png
    - assets/images/onboarding/style/female/
    - assets/images/onboarding/style/male/
    - assets/images/onboarding/style/hijab/
    - assets/images/onboarding/activity/
    - assets/icons/
    - .env
